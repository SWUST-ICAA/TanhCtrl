flatness_reference_publisher:
  ros__parameters:
    topics:
      # Custom reference topic consumed by the controller node
      reference: /tanh_ctrl/reference
      # Start signal published by the controller after takeoff stabilization
      start_tracking: /mission/start_tracking

    vehicle:
      # Gravity magnitude in the NED frame, positive downward
      gravity: 9.81
      # Body-frame FRD inertia diagonal, used to derive torque feedforward from body rates
      inertia_diag: [0.02384669, 0.02394962, 0.04399995]

    planner:
      # Reference publication rate
      publish_rate_hz: 100.0
      # Options: circle / figure_eight / tilted_circle / tilted_figure_eight
      trajectory_type: circle
      # Radius for circle and tilted_circle trajectories
      radius: 1.5
      # Tangential speed for circular motion
      speed: 1.0
      # Period for figure-eight trajectories
      period_s: 8.0
      # X-axis amplitude for figure-eight trajectories
      figure8_x_amplitude_m: 1.5
      # Y-axis amplitude for figure-eight trajectories
      figure8_y_amplitude_m: 0.75
      # Height offset relative to the start point, positive downward in NED
      height_offset_ned: 0.0
      # Tilt angle about the x-axis for tilted trajectories
      tilt_angle_deg: 15.0
      # Yaw mode: track_velocity or fixed
      yaw_mode: track_velocity
      # Speed ramp-up time after start to avoid aggressive initial motion
      speed_ramp_time_s: 2.0

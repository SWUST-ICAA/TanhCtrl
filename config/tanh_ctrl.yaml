tanh_ctrl:
  ros__parameters:
    topics:
      sensor_combined: /fmu/out/sensor_combined
      vehicle_odometry: /fmu/out/vehicle_odometry
      vehicle_status_v1: /fmu/out/vehicle_status_v1
      trajectory_setpoint: /tanh_ctrl/trajectory_setpoint
      actuator_motors: /fmu/in/actuator_motors
      offboard_control_mode: /fmu/in/offboard_control_mode
      vehicle_command: /fmu/in/vehicle_command
      vehicle_thrust_setpoint: /fmu/in/vehicle_thrust_setpoint
      start_tracking: /mission/start_tracking

    control_rate_hz: 1000.0
    publish_offboard_control_mode: true
    publish_vehicle_thrust_setpoint: true
    auto_offboard: true  # 上机前先确认安全
    auto_arm: false      # false: 等待人工解锁；true: 节点自动发送解锁命令
    offboard_warmup: 10

    model:
      mass: 2.0643076923076915
      gravity: 9.81
      inertia_diag: [0.02384669, 0.02394962, 0.04399995]

    position:
      horizontal:
        M_P: 2.5
        K_P: 1.0
        M_V: 8.0
        K_V: 0.5
        K_Acceleration: 1.1
      vertical:
        M_P: 2.0
        K_P: 1.0
        M_V: 6.5
        K_V: 0.5
        K_Acceleration: 1.0
      max_tilt_deg: 35.0
      observer:
        P_V: [1.5, 1.5, 2.5]
        L_V: [1.5, 1.5, 2.5]

    attitude:
      tilt:
        M_Angle: 2.0
        K_Angle: 5.2
        M_AngularVelocity: 10.5
        K_AngularVelocity: 3.6
        K_AngularAcceleration: 0.5
        observer:
          P_AngularVelocity: 1.5
          L_AngularVelocity: 0.4
      yaw:
        M_Angle: 1.0
        K_Angle: 2.0
        M_AngularVelocity: 6.0
        K_AngularVelocity: 3.0
        K_AngularAcceleration: 1.0
        observer:
          P_AngularVelocity: 0.5
          L_AngularVelocity: 0.5

    filters:
      linear:
        horizontal_cutoff_hz: 10.0
        vertical_cutoff_hz: 5.0
      angular_accel_cutoff_hz: 20.0
      velocity_disturbance_cutoff_hz: 5.0
      angular_velocity_disturbance_cutoff_hz: 5.0

    allocation:
      l: 0.246073
      beta: 0.78539816339
      cq_ct: 0.016

    motor:
      force_max: 8.54858
      # 输出索引0..3 <- 内部控制器电机顺序(默认G1列): [前左, 前右, 后右, 后左]
      output_map: [1, 3, 0, 2]

    mission:
      # 解锁后先起飞到该高度；到达并稳定后才向轨迹源发送开始信号
      takeoff_target_z: -2.0
      takeoff_z_threshold: 0.2
      takeoff_hold_time_s: 2.0
      reference_timeout_s: 0.3  # 轨迹断流超时后切回原地悬停
      request_interval_s: 1.0   # offboard / auto_arm 请求重发周期
